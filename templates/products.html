{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4 text-uppercase fw-bold text-danger">Our Products</h2>
    <div class="row fade-in">
        {% for product in products %}
        <div class="col-md-3 mb-4">
            <div class="card product-card h-150">
                <img src="{{ url_for('static', filename='images/' + product['image']) }}" class="card-img-top" alt="{{ product['name'] }}" style="height: 250px; object-fit: cover;">
                <div class="card-body text-center">
                    <h5 class="card-title">{{ product['name'] }}</h5>
                    <p class="text-muted">{{ product['category'] }}</p>
                    <h6 class="text-danger fw-bold">Rs. {{ product['price'] }}</h6>
                    <button onclick="addToCart('{{ product.name }}', '{{ product.price }}', '{{ product.image }}')" class="btn btn-add-cart w-100 mt-2">Add to Cart</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
