{% extends "base.html" %}
{% block content %}

<video autoplay muted loop id="bg-video">
    <source src="/static/videos/you.mp4" type="video/mp4">
</video>
    Your browser does not support the video tag.
<div class="container mt-5 fade-in">
    
   
    <div class="row justify-content-center">
        <div class="col-md-4">
            
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4>User Login</h4>
                </div>
                <div class="card-body">
                    <div id="auth-error" class="alert alert-danger d-none" role="alert"></div>
                    <form id="login-form" method="POST">
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button class="btn btn-success w-100">Login</button>
                    </form>
                    <p class="mt-3 text-center">New here? <a href="/register">Register</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow fade-in">
        
    </div>
</div>
{% endblock %}

{% block page_scripts %}
<script type="module" src="{{ url_for('static', filename='js/auth-pages.js') }}"></script>
{% endblock %}
