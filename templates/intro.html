<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Crackers Supermarket</title>
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js"
        }
    }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
 <video autoplay muted loop id="bg-video" class="w-100" style="height: 100vh; object-fit: cover; opacity: 10;">
            <source src="{{ url_for('static', filename='video/you.mp4') }}" type="video/mp4">
        </video>
    <div class="intro-container">
       
        <div class="intro-overlay fade-in">
            <h1 class="display-4 fw-bold"> Crackers Super Market</h1>
            <p class="lead">Celebrate moments with joy and safety!</p>
            <hr class="my-4">
            
            <div class="d-grid gap-2 col-md-8 mx-auto">
                <a href="{{ url_for('login') }}" class="btn btn-warning btn-lg">Login</a>
                <a href="{{ url_for('register') }}" class="btn btn-outline-light">Register New Account</a>
                
                <p class="mt-3 mb-1"> (Or) Quick Login </p>
                <div id="social-auth-error" class="alert alert-danger d-none" role="alert"></div>
                 
                <a id="google-login-btn" href="{{ url_for('social_login', provider='Google') }}" class="btn btn-social btn-google">
                     Continue with Google
                </a>
                <a href="{{ url_for('social_login', provider='Facebook') }}" class="btn btn-social btn-fb">
                     Continue with Facebook
                </a>
                
            </div>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/firebase-init.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/social-auth.js') }}"></script>
</body>
</html>
