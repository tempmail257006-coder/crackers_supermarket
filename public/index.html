<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Firebase Auth Only</title>

  <script defer src="/__/firebase/12.10.0/firebase-app-compat.js"></script>
  <script defer src="/__/firebase/12.10.0/firebase-auth-compat.js"></script>
  <script defer src="/__/firebase/init.js?useEmulator=false"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .card {
      max-width: 460px;
      margin: 72px auto;
      padding: 24px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    #status {
      color: #475569;
      margin: 0 0 16px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #googleSignInBtn {
      background: #1a73e8;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #googleSignInBtn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    #logoutBtn {
      background: #ef4444;
      color: #fff;
    }
    .hidden {
      display: none;
    }
    #error {
      margin-top: 10px;
      color: #b91c1c;
      font-size: 14px;
    }
    #info {
      margin-top: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px;
      white-space: pre-wrap;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Firebase Authentication</h1>
    <p id="status">Loading Firebase Auth...</p>

    <button id="googleSignInBtn">
      <svg viewBox="0 0 18 18" aria-hidden="true" focusable="false">
        <path fill="#EA4335" d="M17.64 9.2045c0-.6382-.0573-1.2518-.1636-1.8409H9v3.4818h4.8436c-.2087 1.125-.8427 2.0782-1.796 2.7164v2.2582h2.908c1.7029-1.5673 2.6844-3.8773 2.6844-6.6155z"/>
        <path fill="#4285F4" d="M9 18c2.43 0 4.4673-.8064 5.9564-2.1791l-2.908-2.2582c-.8064.5409-1.8373.8604-3.0484.8604-2.344 0-4.3282-1.5832-5.0355-3.7105H.9573v2.3327C2.4382 15.9832 5.4818 18 9 18z"/>
        <path fill="#FBBC05" d="M3.9645 10.7127c-.1799-.5409-.2827-1.1186-.2827-1.7127s.1028-1.1718.2827-1.7127V4.9545H.9573C.3477 6.1691 0 7.5477 0 9s.3477 2.8309.9573 4.0455l3.0072-2.3328z"/>
        <path fill="#34A853" d="M9 3.5768c1.3214 0 2.5077.4541 3.4418 1.3459l2.5814-2.5814C13.4632.8905 11.4259 0 9 0 5.4818 0 2.4382 2.0168.9573 4.9545l3.0072 2.3328C4.6718 5.16 6.656 3.5768 9 3.5768z"/>
      </svg>
      <span>Continue with Google</span>
    </button>

    <button id="logoutBtn" class="hidden">Logout</button>
    <div id="error"></div>
    <pre id="info"></pre>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const statusEl = document.getElementById("status");
      const googleBtn = document.getElementById("googleSignInBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const errorEl = document.getElementById("error");
      const infoEl = document.getElementById("info");

      function setError(message) {
        errorEl.textContent = message || "";
      }

      function signedOutUI() {
        statusEl.textContent = "Firebase Auth is connected. Not signed in.";
        googleBtn.classList.remove("hidden");
        logoutBtn.classList.add("hidden");
        infoEl.textContent = "";
      }

      function signedInUI(user) {
        statusEl.textContent = "Signed in with Firebase Authentication.";
        googleBtn.classList.add("hidden");
        logoutBtn.classList.remove("hidden");
        infoEl.textContent = JSON.stringify(
          {
            uid: user.uid,
            email: user.email,
            name: user.displayName
          },
          null,
          2
        );
      }

      let auth;
      try {
        auth = firebase.auth();
      } catch (error) {
        statusEl.textContent = "Firebase Auth failed to initialize.";
        setError(error.message || "Auth unavailable.");
        return;
      }

      googleBtn.addEventListener("click", async function () {
        setError("");
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await auth.signInWithPopup(provider);
        } catch (error) {
          setError(error.message || "Google sign-in failed.");
        }
      });

      logoutBtn.addEventListener("click", async function () {
        setError("");
        try {
          await auth.signOut();
        } catch (error) {
          setError(error.message || "Logout failed.");
        }
      });

      auth.onAuthStateChanged(function (user) {
        if (user) {
          signedInUI(user);
          return;
        }
        signedOutUI();
      });
    });
  </script>
</body>
</html>
